# Agentxx 配置文件
# 使用方式: agentxx_cli --config agentxx-config.yaml [train|acp]
#
# key 字段支持 ${VAR} 环境变量占位符，会在运行时被真实环境变量替换。
# 查找顺序: 系统环境变量 > .env 文件变量 > 保留 ${VAR} 原样
#
# 可选的 .env 文件（--env 指定文件/当前目录/配置文件同目录）:
#   LLM_API_KEY=sk-your-key-here

models:
  # 声明模型，[name] 取 [default] 仅是自定义名称，并不会被默认使用，应当在 [use_model] 中指定
  - name: qwenai-qwen3.8-max-preview
    base_url: "https://token-plan.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    key: "${QWENAI_API_KEY}"
    modelname: "qwen3.8-max-preview"
    extra_api_config:
      max_tokens: 1000000
      stream: true
  - name: opencode-ds-v4-flash
    base_url: "https://opencode.ai/zen/go/v1"
    key: "${OPENCODE_API_KEY}"
    modelname: "deepseek-v4-flash"
    extra_api_config:
      max_tokens: 1000000
      stream: true
  - name: local
    base_url: "http://172.29.48.1:7070/v1"
    key: "EMPTY"
    modelname: "Agentxx"
    extra_api_config:
      max_tokens: 256000
      stream: true

  # ACP 服务模型
  - name: acp
    base_url: "https://token-plan.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    key: "${QWENAI_API_KEY}"
    modelname: "deepseek-v4-flash"
    extra_api_config: {}

  # 训练主模型
  - name: train
    base_url: "https://token-plan.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    key: "${QWENAI_API_KEY}"
    modelname: "deepseek-v4-flash"
    extra_api_config: {}

  # 训练评分模型
  - name: train_scorer
    base_url: "https://token-plan.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    key: "${QWENAI_API_KEY}"
    modelname: "deepseek-v4-flash"
    extra_api_config: {}

  # 训练优化模型
  - name: train_optimizer
    base_url: "https://token-plan.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    key: "${QWENAI_API_KEY}"
    modelname: "deepseek-v4-flash"
    extra_api_config: {}

# 指定各模式下使用的模型名称（对应上面 models 中的 name）
use_model:
  # default: local
  default: qwenai-qwen3.8-max-preview
  # default: opencode-ds-v4-flash
  acp: acp
  # train: train
  train: local
  train_scorer: train_scorer
  train_optimizer: train_optimizer
